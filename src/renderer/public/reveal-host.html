<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Open Gamma Reveal.js Host</title>

    <!-- Reveal.js Core Stylesheets -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css" />
    <!-- Default Reveal.js Base Theme (black for dark blending) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/black.css"
      id="reveal-theme"
    />
    <!-- Google Fonts Imports for Custom Typography -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Outfit:wght@400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Space+Grotesk:wght@400;500;700&family=Roboto:wght@400;500;700&family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&family=Atkinson+Hyperlegible:wght@400;700&family=Fredoka:wght@400;600;700&family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #0d0d0d;
      }
      .reveal {
        width: 100%;
        height: 100%;
      }
      .reveal-viewport {
        background: transparent !important;
      }

      /* Design System Token Mappings */
      .reveal {
        background: var(--og-slide-bg, #0d0d0d) !important;
        color: var(--og-slide-text, #bab6ae) !important;
      }
      .reveal h1,
      .reveal h2,
      .reveal h3 {
        font-family: var(--og-slide-font-heading, sans-serif) !important;
        color: var(--og-slide-text, #ede9e1) !important;
      }
      .reveal p,
      .reveal li {
        font-family: var(--og-slide-font-body, sans-serif) !important;
      }
      .reveal section .accent {
        color: var(--og-slide-accent, #e8ff57) !important;
      }
      .reveal section strong {
        color: var(--og-slide-accent, #e8ff57) !important;
      }
      .reveal .slide-background {
        background: var(--og-slide-bg, #0d0d0d) !important;
      }

      /* Scale down text inside slides containing generated images to prevent overflow */
      .reveal section.has-image h1,
      .reveal section.has-image h2 {
        font-size: 1.6em !important;
      }
      .reveal section.has-image p,
      .reveal section.has-image li {
        font-size: 0.6em !important;
        line-height: 1.25 !important;
      }
      .reveal section.has-image img {
        max-height: 200px !important;
        object-fit: contain;
        margin-top: 10px !important;
      }

      /* ── Image placeholder (skeleton while generation runs) ── */
      figure.og-image-placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 240px;
        width: 100%;
        border-radius: 14px;
        background: linear-gradient(110deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 100%);
        background-size: 200% 100%;
        animation: og-shimmer 1.6s ease-in-out infinite;
        border: 1px dashed rgba(255,255,255,0.12);
        margin: 0;
      }
      figure.og-image-placeholder::after {
        content: '⚡ Generating image…';
        font-size: 0.75em;
        color: rgba(255,255,255,0.3);
        font-family: 'Inter', sans-serif;
        letter-spacing: 0.08em;
        font-weight: 600;
      }
      figure.og-image-figure {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        margin: 0;
        border-radius: 14px;
        overflow: hidden;
      }
      figure.og-image-figure img {
        max-width: 100%;
        max-height: 380px;
        border-radius: 12px;
        object-fit: cover;
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      }
      .og-img-left { text-align: left; }
      .og-img-right {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 200px;
      }
      @keyframes og-shimmer {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      /* ── Stat / Quote / CTA blocks ── */
      .cta-block {
        background: var(--og-slide-accent, #e8ff57) !important;
        color: #000 !important;
        padding: 28px 32px;
        border-radius: 14px;
        text-align: center;
      }

      /* ── Voiceover progress indicator ── */
      #og-audio-indicator {
        position: fixed;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        align-items: center;
        gap: 8px;
        background: rgba(0,0,0,0.7);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 999px;
        padding: 6px 14px;
        color: #e8ff57;
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.06em;
        backdrop-filter: blur(8px);
        z-index: 9999;
        pointer-events: none;
        user-select: none;
      }
      #og-audio-indicator.visible { display: flex; }
      #og-audio-indicator .dot {
        width: 7px; height: 7px;
        background: #e8ff57;
        border-radius: 50%;
        animation: og-pulse 1.1s ease-in-out infinite;
      }
      @keyframes og-pulse {
        0%,100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.7); }
      }
    </style>
  </head>
  <body>
    <div class="reveal">
      <div class="slides">
        <!-- Live-generated slides will be appended here -->
      </div>
    </div>

    <!-- Audio status indicator pill -->
    <div id="og-audio-indicator">
      <div class="dot"></div>
      <span id="og-audio-label">Playing voiceover…</span>
    </div>

    <!-- Reveal.js Core Library -->
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>

    <script>
      // ══════════════════════════════════════════════════════════════════════════
      //  1.  FONT MANAGEMENT
      // ══════════════════════════════════════════════════════════════════════════
      const loadedFonts = new Set([
        'sans-serif', 'serif', 'monospace', 'system-ui', 'arial', 'helvetica',
        'times new roman', 'courier new', 'georgia', 'trebuchet ms', 'verdana',
        'geneva', 'tahoma', 'courier'
      ]);

      function ensureFontsLoaded() {
        const sections = document.querySelectorAll('.reveal .slides section');
        const fontsToLoad = new Set();

        sections.forEach(section => {
          const style = section.getAttribute('style') || '';
          const headingMatch = style.match(/--og-slide-font-heading:\s*['"']?([^,'";\s]+(?:\s+[^,'";\s]+)*)['"']?/i);
          const bodyMatch    = style.match(/--og-slide-font-body:\s*['"']?([^,'";\s]+(?:\s+[^,'";\s]+)*)['"']?/i);
          if (headingMatch && headingMatch[1]) {
            const name = headingMatch[1].trim();
            if (!loadedFonts.has(name.toLowerCase())) fontsToLoad.add(name);
          }
          if (bodyMatch && bodyMatch[1]) {
            const name = bodyMatch[1].trim();
            if (!loadedFonts.has(name.toLowerCase())) fontsToLoad.add(name);
          }
        });

        if (fontsToLoad.size > 0) {
          const families = Array.from(fontsToLoad).map(name => {
            loadedFonts.add(name.toLowerCase());
            return `family=${name.replace(/\s+/g, '+')}:wght@400;500;700;800`;
          });
          const url = `https://fonts.googleapis.com/css2?${families.join('&')}&display=swap`;
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = url;
          document.head.appendChild(link);
        }
      }

      // ══════════════════════════════════════════════════════════════════════════
      //  2.  SLIDE FONT-SIZE AUTO-SHRINK
      // ══════════════════════════════════════════════════════════════════════════
      function adjustSlideFontSize(section) {
        if (!section) return;
        section.style.fontSize = '';

        const config   = Reveal.getConfig();
        const maxH     = config.height * 0.85;
        const maxW     = config.width  * 0.90;

        const prevDisplay    = section.style.display;
        const prevVisibility = section.style.visibility;
        const prevPosition   = section.style.position;

        section.style.display    = 'block';
        section.style.visibility = 'hidden';
        section.style.position   = 'absolute';

        let fontSize = 1.0;
        const MIN    = 0.45;
        const STEP   = 0.03;

        while ((section.scrollHeight > maxH || section.scrollWidth > maxW) && fontSize > MIN) {
          fontSize -= STEP;
          section.style.fontSize = fontSize + 'em';
        }

        section.style.display    = prevDisplay;
        section.style.visibility = prevVisibility;
        section.style.position   = prevPosition;
      }

      function adjustAllSlideFontSizes() {
        document.querySelectorAll('.reveal .slides section').forEach(adjustSlideFontSize);
        Reveal.layout();
      }

      // ══════════════════════════════════════════════════════════════════════════
      //  3.  REVEAL.JS INIT
      // ══════════════════════════════════════════════════════════════════════════
      Reveal.initialize({
        hash: false,
        controls: true,
        progress: false,
        slideNumber: 'c/t',
        transition: 'fade',
        transitionSpeed: 'fast',
        width:  1280,
        height: 720,
        margin: 0.1
      });

      Reveal.on('ready', () => {
        ensureFontsLoaded();
        adjustAllSlideFontSizes();
      });

      // ══════════════════════════════════════════════════════════════════════════
      //  4.  VOICEOVER + AUTO-ADVANCE STATE MACHINE
      //
      //  States:
      //    isPresentationPlaying  – user has pressed ▶ Play
      //    voiceoverMuted         – voiceover volume is silenced
      //    autoAdvance            – slide advances automatically when audio ends
      //    audioMap               – { slideIndex: 'og-audio://...' }
      //
      //  Flow:
      //    PLAY_PRESENTATION  →  isPresentationPlaying = true, playSlide(current)
      //    PAUSE_PRESENTATION →  isPresentationPlaying = false, pause audio + timeout
      //    slidechanged       →  stopCurrentAudio(), if playing → playSlide(newIdx)
      //    audio 'ended'      →  if autoAdvance → Reveal.next()
      //    audio 'error'      →  if autoAdvance → scheduleNextSlide(fallbackMs)
      // ══════════════════════════════════════════════════════════════════════════

      let audioMap              = {};
      let currentAudio          = null;
      let autoAdvanceTimer      = null;
      let isPresentationPlaying = false;
      let voiceoverMuted        = false;
      let voiceoverVolume       = 1.0;
      let autoAdvance           = true;   // default ON — Reveal advances with audio

      const indicator      = document.getElementById('og-audio-indicator');
      const indicatorLabel = document.getElementById('og-audio-label');

      function setIndicator(visible, text) {
        if (visible) {
          indicator.classList.add('visible');
          indicatorLabel.textContent = text || 'Playing voiceover…';
        } else {
          indicator.classList.remove('visible');
        }
      }

      function clearAutoAdvanceTimer() {
        if (autoAdvanceTimer !== null) {
          clearTimeout(autoAdvanceTimer);
          autoAdvanceTimer = null;
        }
      }

      function stopCurrentAudio() {
        clearAutoAdvanceTimer();
        if (currentAudio) {
          currentAudio.pause();
          currentAudio.src = '';
          currentAudio = null;
        }
        setIndicator(false);
      }

      /**
       * Schedule a fallback advance after `ms` milliseconds (used when a slide
       * has no voiceover or when audio playback fails).
       */
      function scheduleNextSlide(ms) {
        clearAutoAdvanceTimer();
        if (!autoAdvance || !isPresentationPlaying) return;
        autoAdvanceTimer = setTimeout(() => {
          autoAdvanceTimer = null;
          Reveal.next();
        }, ms);
      }

      /**
       * Core play function — plays the voiceover for a given slide index.
       * When audio ends (or fails) it triggers Reveal.next() if autoAdvance is on.
       */
      function playSlide(index) {
        stopCurrentAudio();

        if (!isPresentationPlaying) return;

        const src = audioMap[index];

        if (!src) {
          // No voiceover for this slide: wait a fixed dwell time then advance
          const totalSlides = Reveal.getTotalSlides();
          const isLastSlide = (index >= totalSlides - 1);
          if (!isLastSlide) {
            scheduleNextSlide(4000); // 4-second dwell for slides without voiceover
          }
          return;
        }

        const audio = new Audio(src);
        currentAudio = audio;
        audio.muted  = voiceoverMuted;
        audio.volume = voiceoverMuted ? 0 : voiceoverVolume;

        audio.addEventListener('play', () => {
          setIndicator(true, 'Speaking…');
          window.parent.postMessage({ type: 'AUDIO_PLAYING', index }, '*');
        });

        audio.addEventListener('pause', () => {
          setIndicator(false);
          window.parent.postMessage({ type: 'AUDIO_PAUSED', index }, '*');
        });

        audio.addEventListener('ended', () => {
          setIndicator(false);
          window.parent.postMessage({ type: 'AUDIO_ENDED', index }, '*');
          currentAudio = null;
          const totalSlides = Reveal.getTotalSlides();
          const isLastSlide  = (index >= totalSlides - 1);
          if (autoAdvance && isPresentationPlaying && !isLastSlide) {
            // Small natural pause between slides
            scheduleNextSlide(600);
          }
        });

        audio.addEventListener('error', (e) => {
          console.warn('[og-audio] Playback error on slide', index, e);
          setIndicator(false);
          currentAudio = null;
          scheduleNextSlide(4000); // Fallback dwell
        });

        audio.play().catch(err => {
          console.warn('[og-audio] play() rejected:', err);
          setIndicator(false);
          currentAudio = null;
          scheduleNextSlide(4000);
        });
      }

      // ── Reveal slide-changed hook ───────────────────────────────────────────
      Reveal.on('slidechanged', event => {
        const idx = event.indexh;
        window.parent.postMessage({ type: 'SLIDE_CHANGED', index: idx }, '*');
        // Always stop whatever was playing; restart if presentation is running
        stopCurrentAudio();
        if (isPresentationPlaying) {
          // Small delay to let the transition animation finish before speaking
          setTimeout(() => playSlide(idx), 400);
        }
      });

      // ══════════════════════════════════════════════════════════════════════════
      //  5.  SLIDE MANAGEMENT API
      // ══════════════════════════════════════════════════════════════════════════
      window.addSlide = function(html) {
        const slidesContainer = document.querySelector('.reveal .slides');
        if (!slidesContainer) return;

        const trimmed = html.trim();
        let section;

        if (trimmed.startsWith('<section')) {
          const div = document.createElement('div');
          div.innerHTML = trimmed;
          section = div.firstElementChild;
        }

        if (!section) {
          section = document.createElement('section');
          section.innerHTML = html;
        }

        slidesContainer.appendChild(section);
        Reveal.sync();
        Reveal.slide(Reveal.getTotalSlides() - 1);

        setTimeout(() => {
          ensureFontsLoaded();
          adjustAllSlideFontSizes();
        }, 60);
      };

      window.clearSlides = function() {
        const slidesContainer = document.querySelector('.reveal .slides');
        if (slidesContainer) slidesContainer.innerHTML = '';
        Reveal.sync();
        stopCurrentAudio();
      };

      window.setTheme = function(cssTokens) {
        let styleTag = document.getElementById('custom-theme-variables');
        if (!styleTag) {
          styleTag = document.createElement('style');
          styleTag.id = 'custom-theme-variables';
          document.head.appendChild(styleTag);
        }
        styleTag.innerHTML = cssTokens;

        const themeFonts = new Set();
        const mainMatch    = cssTokens.match(/--r-main-font:\s*['"']?([^,'";\s]+(?:\s+[^,'";\s]+)*)['"']?/i);
        const headingMatch = cssTokens.match(/--r-heading-font:\s*['"']?([^,'";\s]+(?:\s+[^,'";\s]+)*)['"']?/i);

        if (mainMatch    && mainMatch[1])    { const n = mainMatch[1].trim();    if (!loadedFonts.has(n.toLowerCase())) themeFonts.add(n); }
        if (headingMatch && headingMatch[1]) { const n = headingMatch[1].trim(); if (!loadedFonts.has(n.toLowerCase())) themeFonts.add(n); }

        if (themeFonts.size > 0) {
          const families = Array.from(themeFonts).map(name => {
            loadedFonts.add(name.toLowerCase());
            return `family=${name.replace(/\s+/g, '+')}:wght@400;500;700;800`;
          });
          const url = `https://fonts.googleapis.com/css2?${families.join('&')}&display=swap`;
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = url;
          document.head.appendChild(link);
        }

        setTimeout(adjustAllSlideFontSizes, 60);
      };

      // ══════════════════════════════════════════════════════════════════════════
      //  6.  postMessage RECEIVER  (React ↔ iframe bridge)
      // ══════════════════════════════════════════════════════════════════════════
      window.addEventListener('message', function(event) {
        const data = event.data;
        if (!data || typeof data !== 'object') return;

        switch (data.type) {

          // ── Layout ──────────────────────────────────────────────────────────
          case 'SET_ASPECT_RATIO': {
            if (typeof data.aspectRatio === 'string') {
              let w = 1280, h = 720;
              if (data.aspectRatio === '9:16') { w = 720;  h = 1280; }
              else if (data.aspectRatio === '1:1') { w = 960; h = 960; }
              Reveal.configure({ width: w, height: h });
              Reveal.layout();
              setTimeout(adjustAllSlideFontSizes, 60);
            }
            break;
          }

          // ── Slide mutations ─────────────────────────────────────────────────
          case 'ADD_SLIDE':
            if (typeof data.html === 'string') window.addSlide(data.html);
            break;

          case 'CLEAR_SLIDES':
            window.clearSlides();
            break;

          case 'REPLACE_SLIDE': {
            if (typeof data.index === 'number' && typeof data.html === 'string') {
              const cont = document.querySelector('.reveal .slides');
              if (cont) {
                const secs = cont.querySelectorAll('section');
                const target = secs[data.index];
                if (target) {
                  const tmp = document.createElement('div');
                  tmp.innerHTML = data.html;
                  const newSec = tmp.firstElementChild || document.createElement('section');
                  if (!tmp.firstElementChild) newSec.innerHTML = data.html;
                  cont.replaceChild(newSec, target);
                  Reveal.sync();
                  Reveal.slide(data.index);
                  setTimeout(() => { ensureFontsLoaded(); adjustAllSlideFontSizes(); }, 60);
                }
              }
            }
            break;
          }

          // ── Navigation ─────────────────────────────────────────────────────
          case 'GO_TO_SLIDE':
            if (typeof data.index === 'number') {
              stopCurrentAudio();
              Reveal.slide(data.index);
            }
            break;

          case 'NEXT_SLIDE':
            stopCurrentAudio();
            Reveal.next();
            break;

          case 'PREV_SLIDE':
            stopCurrentAudio();
            Reveal.prev();
            break;

          // ── Theme ───────────────────────────────────────────────────────────
          case 'SET_THEME':
            if (typeof data.cssTokens === 'string') window.setTheme(data.cssTokens);
            break;

          case 'SET_REVEAL_THEME': {
            if (typeof data.themeName === 'string') {
              const link = document.getElementById('reveal-theme');
              if (link) link.setAttribute('href', `https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/${data.themeName}.css`);
            }
            break;
          }

          // ── Audio Map ───────────────────────────────────────────────────────
          case 'SET_AUDIO_MAP':
            if (data.audioMap && typeof data.audioMap === 'object') {
              audioMap = data.audioMap;
              console.log('[og-reveal] audioMap updated, keys:', Object.keys(audioMap));
            }
            break;

          // ── Playback control ────────────────────────────────────────────────
          //  PLAY_PRESENTATION  : called when user clicks ▶ Play in React UI
          //  PAUSE_PRESENTATION : called when user clicks ⏸ Pause
          //  TOGGLE_PLAY_PAUSE  : legacy toggle (keeps compatibility)
          case 'PLAY_PRESENTATION': {
            isPresentationPlaying = true;
            const idx = Reveal.getIndices().h;
            window.parent.postMessage({ type: 'AUDIO_PLAYING', index: idx }, '*');
            playSlide(idx);
            break;
          }

          case 'PAUSE_PRESENTATION': {
            isPresentationPlaying = false;
            if (currentAudio && !currentAudio.paused) currentAudio.pause();
            clearAutoAdvanceTimer();
            window.parent.postMessage({ type: 'AUDIO_PAUSED', index: Reveal.getIndices().h }, '*');
            break;
          }

          case 'TOGGLE_PLAY_PAUSE': {
            if (isPresentationPlaying) {
              // Pause
              isPresentationPlaying = false;
              if (currentAudio && !currentAudio.paused) currentAudio.pause();
              clearAutoAdvanceTimer();
              window.parent.postMessage({ type: 'AUDIO_PAUSED', index: Reveal.getIndices().h }, '*');
            } else {
              // Resume / start
              isPresentationPlaying = true;
              const idx = Reveal.getIndices().h;
              if (currentAudio && currentAudio.src && currentAudio.paused) {
                currentAudio.play().catch(() => playSlide(idx));
              } else {
                playSlide(idx);
              }
              window.parent.postMessage({ type: 'AUDIO_PLAYING', index: idx }, '*');
            }
            break;
          }

          case 'STOP_AUDIO':
            isPresentationPlaying = false;
            stopCurrentAudio();
            break;

          // ── Auto-advance ────────────────────────────────────────────────────
          case 'SET_AUTO_ADVANCE':
            autoAdvance = !!data.autoAdvance;
            if (!autoAdvance) clearAutoAdvanceTimer();
            break;

          // ── Voiceover settings ──────────────────────────────────────────────
          case 'SET_VOICEOVER_SETTINGS':
            voiceoverMuted  = !!data.muted;
            voiceoverVolume = typeof data.volume === 'number' ? data.volume : 1.0;
            if (currentAudio) {
              currentAudio.muted  = voiceoverMuted;
              currentAudio.volume = voiceoverMuted ? 0 : voiceoverVolume;
            }
            break;
        }
      });
    </script>
  </body>
</html>
