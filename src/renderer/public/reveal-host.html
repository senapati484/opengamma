<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Open Gamma Reveal.js Host</title>

    <!-- Reveal.js Core Stylesheets -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css" />
    <!-- Default Reveal.js Base Theme (black for dark blending) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/black.css"
      id="reveal-theme"
    />
    <!-- Google Fonts Imports for Custom Typography -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Outfit:wght@400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Space+Grotesk:wght@400;500;700&family=Roboto:wght@400;500;700&family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&family=Atkinson+Hyperlegible:wght@400;700&family=Fredoka:wght@400;600;700&family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #0d0d0d;
      }
      .reveal {
        width: 100%;
        height: 100%;
      }
      .reveal-viewport {
        background: transparent !important;
      }

      /* Design System Token Mappings */
      .reveal {
        background: var(--og-slide-bg, #0d0d0d) !important;
        color: var(--og-slide-text, #bab6ae) !important;
      }
      .reveal h1,
      .reveal h2,
      .reveal h3 {
        font-family: var(--og-slide-font-heading, sans-serif) !important;
        color: var(--og-slide-text, #ede9e1) !important;
      }
      .reveal p,
      .reveal li {
        font-family: var(--og-slide-font-body, sans-serif) !important;
      }
      .reveal section .accent {
        color: var(--og-slide-accent, #e8ff57) !important;
      }
      .reveal section strong {
        color: var(--og-slide-accent, #e8ff57) !important;
      }
      .reveal .slide-background {
        background: var(--og-slide-bg, #0d0d0d) !important;
      }

      /* Scale down text inside slides containing generated images to prevent overflow */
      .reveal section.has-image h1,
      .reveal section.has-image h2 {
        font-size: 1.6em !important;
      }
      .reveal section.has-image p,
      .reveal section.has-image li {
        font-size: 0.6em !important;
        line-height: 1.25 !important;
      }
      .reveal section.has-image img {
        max-height: 200px !important;
        object-fit: contain;
        margin-top: 10px !important;
      }
    </style>
  </head>
  <body>
    <div class="reveal">
      <div class="slides">
        <!-- Live-generated slides will be appended here -->
      </div>
    </div>

    <!-- Reveal.js Core Library -->
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>

    <script>
      // 1. Font and sizing systems
      const loadedFonts = new Set([
        'sans-serif', 'serif', 'monospace', 'system-ui', 'arial', 'helvetica', 
        'times new roman', 'courier new', 'georgia', 'trebuchet ms', 'verdana', 
        'geneva', 'tahoma', 'courier'
      ]);

      function ensureFontsLoaded() {
        const sections = document.querySelectorAll('.reveal .slides section');
        const fontsToLoad = new Set();

        sections.forEach(section => {
          const style = section.getAttribute('style') || '';
          const headingMatch = style.match(/--og-slide-font-heading:\s*['"]?([^,'";\s]+(?:\s+[^,'";\s]+)*)['"]?/i);
          const bodyMatch = style.match(/--og-slide-font-body:\s*['"]?([^,'";\s]+(?:\s+[^,'";\s]+)*)['"]?/i);

          if (headingMatch && headingMatch[1]) {
            const name = headingMatch[1].trim();
            if (!loadedFonts.has(name.toLowerCase())) {
              fontsToLoad.add(name);
            }
          }
          if (bodyMatch && bodyMatch[1]) {
            const name = bodyMatch[1].trim();
            if (!loadedFonts.has(name.toLowerCase())) {
              fontsToLoad.add(name);
            }
          }
        });

        if (fontsToLoad.size > 0) {
          const families = Array.from(fontsToLoad).map(name => {
            loadedFonts.add(name.toLowerCase());
            return `family=${name.replace(/\s+/g, '+')}:wght@400;500;700;800`;
          });
          const url = `https://fonts.googleapis.com/css2?${families.join('&')}&display=swap`;
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = url;
          document.head.appendChild(link);
        }
      }

      function adjustSlideFontSize(section) {
        if (!section) return;
        
        section.style.fontSize = '';

        const config = Reveal.getConfig();
        const maxHeight = config.height * 0.85;
        const maxWidth = config.width * 0.90;

        const prevDisplay = section.style.display;
        const prevVisibility = section.style.visibility;
        const prevPosition = section.style.position;

        section.style.display = 'block';
        section.style.visibility = 'hidden';
        section.style.position = 'absolute';

        let fontSize = 1.0;
        const minFontSize = 0.45;
        const step = 0.03;

        while (
          (section.scrollHeight > maxHeight || section.scrollWidth > maxWidth) && 
          fontSize > minFontSize
        ) {
          fontSize -= step;
          section.style.fontSize = fontSize + 'em';
        }

        section.style.display = prevDisplay;
        section.style.visibility = prevVisibility;
        section.style.position = prevPosition;
      }

      function adjustAllSlideFontSizes() {
        const sections = document.querySelectorAll('.reveal .slides section');
        sections.forEach(section => {
          adjustSlideFontSize(section);
        });
        Reveal.layout();
      }

      // Initialize Reveal.js with specified configurations
      Reveal.initialize({
        hash: false,
        controls: true,
        progress: false,
        slideNumber: 'c/t',
        transition: 'fade',
        transitionSpeed: 'fast',
        width: 1280,
        height: 720,
        margin: 0.1
      });

      Reveal.on('ready', () => {
        ensureFontsLoaded();
        adjustAllSlideFontSizes();
      });

      Reveal.on('slidechanged', (event) => {
        window.parent.postMessage({ type: 'SLIDE_CHANGED', index: event.indexh }, '*');
      });

      // 2. Expose window.addSlide(html: string) to append new slides and navigate
      window.addSlide = function (html) {
        const slidesContainer = document.querySelector('.reveal .slides');
        if (!slidesContainer) return;

        const trimmedHtml = html.trim();
        let sectionElement;

        if (trimmedHtml.startsWith('<section')) {
          const tempDiv = document.createElement('div');
          tempDiv.innerHTML = trimmedHtml;
          sectionElement = tempDiv.firstElementChild;
        }

        if (!sectionElement) {
          sectionElement = document.createElement('section');
          sectionElement.innerHTML = html;
        }

        slidesContainer.appendChild(sectionElement);
        Reveal.sync();
        Reveal.slide(Reveal.getTotalSlides() - 1);

        setTimeout(() => {
          ensureFontsLoaded();
          adjustAllSlideFontSizes();
        }, 50);
      };

      // 3. Expose window.clearSlides() to flush all slide contents
      window.clearSlides = function () {
        const slidesContainer = document.querySelector('.reveal .slides');
        if (slidesContainer) {
          slidesContainer.innerHTML = '';
        }
        Reveal.sync();
      };

      // 4. Expose window.setTheme(cssTokens: string) to inject CSS variable overrides
      window.setTheme = function (cssTokens) {
        let styleTag = document.getElementById('custom-theme-variables');

        if (!styleTag) {
          styleTag = document.createElement('style');
          styleTag.id = 'custom-theme-variables';
          document.head.appendChild(styleTag);
        }

        styleTag.innerHTML = cssTokens;

        // Parse theme level fonts
        const themeFonts = new Set();
        const mainMatch = cssTokens.match(/--r-main-font:\s*['"]?([^,'";\s]+(?:\s+[^,'";\s]+)*)['"]?/i);
        const headingMatch = cssTokens.match(/--r-heading-font:\s*['"]?([^,'";\s]+(?:\s+[^,'";\s]+)*)['"]?/i);

        if (mainMatch && mainMatch[1]) {
          const name = mainMatch[1].trim();
          if (!loadedFonts.has(name.toLowerCase())) themeFonts.add(name);
        }
        if (headingMatch && headingMatch[1]) {
          const name = headingMatch[1].trim();
          if (!loadedFonts.has(name.toLowerCase())) themeFonts.add(name);
        }

        if (themeFonts.size > 0) {
          const families = Array.from(themeFonts).map(name => {
            loadedFonts.add(name.toLowerCase());
            return `family=${name.replace(/\s+/g, '+')}:wght@400;500;700;800`;
          });
          const url = `https://fonts.googleapis.com/css2?${families.join('&')}&display=swap`;
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = url;
          document.head.appendChild(link);
        }

        setTimeout(() => {
          adjustAllSlideFontSizes();
        }, 50);
      };

      // 5. Setup postMessage event receiver for loose coupling and iframe compatibility
      window.addEventListener('message', function (event) {
        const data = event.data;
        if (!data || typeof data !== 'object') return;

        switch (data.type) {
          case 'SET_ASPECT_RATIO':
            if (typeof data.aspectRatio === 'string') {
              let w = 1280,
                h = 720;
              if (data.aspectRatio === '9:16') {
                w = 720;
                h = 1280;
              } else if (data.aspectRatio === '1:1') {
                w = 960;
                h = 960;
              }
              Reveal.configure({ width: w, height: h });
              Reveal.layout();
              setTimeout(() => {
                adjustAllSlideFontSizes();
              }, 50);
            }
            break;

          case 'ADD_SLIDE':
            if (typeof data.html === 'string') {
              window.addSlide(data.html);
            }
            break;

          case 'CLEAR_SLIDES':
            window.clearSlides();
            break;

          case 'SET_THEME':
            if (typeof data.cssTokens === 'string') {
              window.setTheme(data.cssTokens);
            }
            break;

          case 'SET_REVEAL_THEME':
            if (typeof data.themeName === 'string') {
              const themeLink = document.getElementById('reveal-theme');
              if (themeLink) {
                themeLink.setAttribute(
                  'href',
                  'https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/' +
                    data.themeName +
                    '.css'
                );
              }
            }
            break;

          case 'NEXT_SLIDE':
            Reveal.next();
            break;

          case 'PREV_SLIDE':
            Reveal.prev();
            break;

          case 'GO_TO_SLIDE':
            if (typeof data.index === 'number') {
              Reveal.slide(data.index);
            }
            break;

          case 'REPLACE_SLIDE':
            if (typeof data.index === 'number' && typeof data.html === 'string') {
              const slidesContainer = document.querySelector('.reveal .slides');
              if (slidesContainer) {
                const sections = slidesContainer.querySelectorAll('section');
                const target = sections[data.index];
                if (target) {
                  const temp = document.createElement('div');
                  temp.innerHTML = data.html;
                  const newSec = temp.firstElementChild || document.createElement('section');
                  if (!temp.firstElementChild) newSec.innerHTML = data.html;
                  slidesContainer.replaceChild(newSec, target);
                  Reveal.sync();
                  Reveal.slide(data.index);

                  setTimeout(() => {
                    ensureFontsLoaded();
                    adjustAllSlideFontSizes();
                  }, 50);
                }
              }
            }
            break;
        }
      });
    </script>
  </body>
</html>
