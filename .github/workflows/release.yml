name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Compile
        run: npm run compile

      - name: Test Packaging (Dry Run, non-tag pushes)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        run: |
          case "$RUNNER_OS" in
            Windows) npx electron-builder --win  --dir ;;
            macOS)   npx electron-builder --mac  --dir ;;
            *)       npx electron-builder --linux --dir ;;
          esac

      - name: Package & Publish Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          case "$RUNNER_OS" in
            Windows) npx electron-builder --win   --publish always ;;
            macOS)   npx electron-builder --mac   --publish always ;;
            *)       npx electron-builder --linux --publish always ;;
          esac
