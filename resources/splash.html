<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Open Gamma Splash</title>
    <style>
      :root {
        --og-background: #0d0d0d;
        --og-accent: #e8ff57;
        --og-muted: #808080;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--og-background);
        color: #ffffff;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        width: 300px;
        height: 200px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        -webkit-app-region: drag; /* Allows moving the frameless window */
        user-select: none;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        -webkit-app-region: no-drag;
      }

      .logo-container {
        position: relative;
        width: 64px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: logo-glow 3s ease-in-out infinite alternate;
      }

      .logo-svg {
        width: 64px;
        height: 64px;
      }

      .title {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.05em;
        color: #ffffff;
        margin-top: 4px;
      }

      .loading {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.1em;
        color: var(--og-muted);
        text-transform: uppercase;
        animation: pulse 1.5s ease-in-out infinite;
      }

      @keyframes logo-glow {
        0% {
          filter: drop-shadow(0 0 4px rgba(232, 255, 87, 0.2));
        }
        100% {
          filter: drop-shadow(0 0 12px rgba(232, 255, 87, 0.6));
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo-container">
        <!-- Inline Vector Logo for Instant Rendering -->
        <svg class="logo-svg" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <rect width="512" height="512" rx="112" fill="#0d0d0d" />
          <!-- O -->
          <circle cx="156" cy="256" r="68" fill="none" stroke="#ffffff" stroke-width="38" />
          <!-- G -->
          <path
            d="M 404,208 A 68 68 0 1 0 404,304 L 404,256 L 340,256"
            fill="none"
            stroke="#e8ff57"
            stroke-width="38"
            stroke-linecap="square"
            stroke-linejoin="miter"
          />
        </svg>
      </div>

      <div style="text-align: center">
        <div class="title">Open Gamma</div>
        <div class="loading" style="margin-top: 6px">Loading...</div>
      </div>
    </div>

    <script>
      // Wait for the duration, then signal splash completion to the main process
      setTimeout(() => {
        try {
          const ipc = window.ipcRenderer || (window.electron && window.electron.ipcRenderer)
          if (ipc) {
            ipc.send('splash-completed')
          } else {
            // Fallback node integration check
            const { ipcRenderer } = require('electron')
            ipcRenderer.send('splash-completed')
          }
        } catch (e) {
          console.log('Splash completed event signal attempted.')
        }
      }, 1500)
    </script>
  </body>
</html>
